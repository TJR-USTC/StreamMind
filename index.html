<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>灵犀 StreamMind | 多智能体直播生态流</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#cbd5e1;font-family:'Noto Sans SC','JetBrains Mono',sans-serif;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#1e1e30;border-radius:2px}
.panel{border:1px solid #1e1e30;border-radius:12px;background:#0f0f1a;box-shadow:0 0 30px rgba(0,0,0,.4)}
@keyframes pulseAnim{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.5)}50%{box-shadow:0 0 0 10px rgba(0,255,136,0)}}
.pulse{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.pulse.live{background:#00ff88;animation:pulseAnim 2s ease-in-out infinite}.pulse.off{background:#64748b}
@keyframes cardSlide{0%{opacity:0;transform:translateY(20px) scale(.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
.card-pop{animation:cardSlide .45s cubic-bezier(.16,1,.3,1)}
@keyframes cardGlow{0%,100%{box-shadow:0 0 20px rgba(0,255,136,.08)}50%{box-shadow:0 0 40px rgba(0,255,136,.2),0 0 80px rgba(0,255,136,.06)}}
.card-glow{animation:cardGlow 3s ease-in-out infinite}
@keyframes driftPulse{0%,100%{opacity:1}50%{opacity:.4}}
.drift-active{animation:driftPulse 1s ease-in-out 3}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid #1e1e30;border-top-color:#00ff88;border-radius:50%;animation:spin .6s linear infinite}
.btn-primary{transition:all .2s ease}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-danger{transition:all .2s ease}
.fade-in{animation:fadein .3s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
</style>
</head>
<body class="flex flex-col h-screen">

<header class="h-16 bg-[#0f0f1a] border-b border-[#1e1e30] flex items-center px-6 gap-6 shrink-0 z-20">
  <h1 class="text-lg font-black tracking-wider"><span style="color:#00d4ff">灵犀</span><span class="text-xs text-gray-500 ml-2">StreamMind v5.2</span></h1>
  <div class="flex items-center gap-1 ml-4"><span id="status-dot" class="pulse off"></span><span id="status-text" class="text-xs text-gray-500 uppercase">离线</span></div>
  <div class="flex items-center gap-5 ml-auto">
    <div class="flex items-center gap-2"><label class="text-xs text-gray-500">轮换</label>
      <select id="rotation-interval" class="bg-[#0a0a0f] border border-[#1e1e30] rounded-lg px-3 py-1.5 text-sm text-gray-300 outline-none focus:border-[#00ff88]">
        <option value="0.1">0.1秒</option><option value="1">1秒</option><option value="5">5秒</option><option value="10">10秒</option><option value="15" selected>15秒</option><option value="30">30秒</option>
      </select>
    </div>
    <div id="mic-indicator" class="flex items-center gap-2 hidden">
      <div class="flex items-end gap-[2px] h-5" id="mic-bars"></div>
      <span id="mic-silence-timer" class="text-xs text-gray-600">--</span>
    </div>
    <label class="flex items-center gap-1 text-xs text-gray-500 cursor-pointer"><input type="checkbox" id="chk-webcam" checked onchange="toggleWebcam()"> 摄像头</label>
    <button id="btn-live-toggle" class="btn-primary px-6 py-2 rounded-lg text-sm font-bold tracking-wider bg-gradient-to-r from-green-600 to-emerald-600 text-white hover:shadow-lg hover:shadow-green-500/25" onclick="toggleLive()">开始直播</button>
  </div>
</header>

<main class="flex flex-1 overflow-hidden">
   <aside class="w-[38%] min-w-[440px] border-r border-[#1e1e30] flex flex-col gap-2 p-2 overflow-y-auto">
    <div class="panel p-3">
      <h3 class="text-xs text-gray-500 uppercase tracking-wider mb-2 flex items-center gap-2">观众偏好 Top 5 <span id="top5-loading" class="spinner hidden"></span></h3>
      <div id="top5-list" class="flex flex-col gap-2">
        <div class="text-xs text-gray-700 text-center py-6">等待开播...</div>
      </div>
    </div>
    <div class="panel p-3" id="webcam-panel">
      <div class="flex items-center justify-between mb-1"><h3 class="text-xs text-gray-500 uppercase tracking-wider">直播画面</h3><span id="rec-dot" class="w-2 h-2 rounded-full bg-red-500 hidden"></span></div>
      <div class="relative bg-black rounded-lg overflow-hidden" style="aspect-ratio:16/9;min-height:190px">
        <video id="webcam-video" autoplay muted playsinline class="w-full h-full object-cover hidden"></video>
        <div id="webcam-placeholder" class="absolute inset-0 flex items-center justify-center text-gray-700 text-xs"><div class="text-center"><div class="text-2xl mb-1 opacity-30">&#128247;</div>等待开播...</div></div>
      </div>
    </div>
    <div class="panel p-3">
      <div class="grid grid-cols-3 gap-2 text-center text-xs">
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-gray-600">基线Top1</div><div id="drift-baseline" class="text-gray-500 mt-1 text-[11px]">--</div></div>
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-gray-600">当前Top1</div><div id="drift-current" class="text-[#00ff88] mt-1 text-[11px]">--</div></div>
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-gray-600">漂移距离</div><div id="drift-distance" class="text-[#ffd700] font-bold mt-1">--</div></div>
      </div>
      <div class="grid grid-cols-4 gap-2 text-center mt-2">
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-base font-bold text-[#00ff88]" id="stat-online">0</div><div class="text-[10px] text-gray-600">在线</div></div>
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-base font-bold text-[#00d4ff]" id="stat-rotations">0</div><div class="text-[10px] text-gray-600">轮换</div></div>
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-base font-bold text-[#ff2d95]" id="stat-cards">0</div><div class="text-[10px] text-gray-600">卡片</div></div>
        <div class="bg-[#0a0a0f] rounded p-2"><div class="text-base font-bold text-[#ffd700]" id="stat-elapsed">00:00</div><div class="text-[10px] text-gray-600">时长</div></div>
      </div>
    </div>
    <div class="panel p-3 flex-1 flex flex-col min-h-0" style="min-height:180px">
      <div class="flex items-center justify-between mb-1">
        <h3 class="text-xs text-gray-500 uppercase tracking-wider flex items-center gap-2">在线用户画像 <span id="users-loading" class="spinner hidden"></span></h3>
        <span class="text-xs text-gray-600" id="table-count">0人</span>
      </div>
      <div class="flex-1 overflow-y-auto" id="online-users-table">
        <div class="text-xs text-gray-700 text-center py-4">等待开播...</div>
      </div>
    </div>
  </aside>

  <section class="flex-1 flex flex-col p-3 gap-3 overflow-hidden">
    <div class="flex items-center gap-1 bg-[#0f0f1a] rounded-lg p-1 w-fit">
      <button class="px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-[#0a0a0f] text-[#00ff88]" id="tab-cards-btn" onclick="switchMode('cards')">决策卡片</button>
      <button class="px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-600" id="tab-clips-btn" onclick="switchMode('clips')">高光切片</button>
    </div>
    <div id="view-cards" class="flex-1 overflow-y-auto flex flex-col gap-3 p-1">
      <div class="text-center py-12 text-gray-600"><div class="text-6xl mb-4 opacity-10">&#9830;</div><p class="text-sm">点击 <span class="text-[#00ff88] font-bold">开始直播</span> 启动</p></div>
    </div>
    <div id="view-clips" class="flex-1 overflow-y-auto flex flex-col gap-3 p-1 hidden">
      <div class="panel p-3" style="min-height:260px">
        <h3 class="text-xs text-gray-500 uppercase tracking-wider mb-2">直播间人数变化曲线</h3>
        <div id="audience-history-chart" style="height:220px"></div>
      </div>
      <div id="clip-gallery"></div>
    </div>
    <div class="flex items-center gap-6 text-xs text-gray-600"><span id="info-status">状态: 离线</span><span id="info-cards">卡片: 0</span><span id="info-clips">切片: 0</span></div>
  </section>
</main>

<script>
const API='http://localhost:8000';
let isLive=false,cardSource=null,statsTimer=null,elapsedTimer=null,onlineUsersTimer=null,liveStartTime=0;
let chartInstance=null,totalCards=0,currentMode='cards';
let audienceHistoryData=[];
let mediaStream=null,mediaRecorder=null,recordedChunks=[];
let highlightClips=[],currentClipStart=null,webcamEnabled=true;
let audioContext=null,analyserNode=null,micStream=null;
let micCheckInterval=null,silenceStart=null,micEnabled=true;
const MIC_THRESHOLD=0.015,SILENCE_DURATION=10000;
const LABELS=['知识干货','游戏娱乐','美食探店','科技数码','户外旅行','萌宠日常','情感心理','穿搭美妆','运动健身','影视八卦','职场提升','家居生活'];
const COLORS=['#ff6b6b','#ffd93d','#4ecdc4','#4d96ff','#6bcb77','#ff922b','#845ef7','#f06595','#20c997','#339af0','#fcc419','#94d82d'];
const MEDALS=['1','2','3','4','5'];
const TOP5_COLORS=['#ff6b6b','#ffd93d','#4ecdc4','#6bcb77','#4d96ff'];

function renderTop5(p){
  var el=document.getElementById('top5-list');
  if(!el)return;
  var top5=p.slice(0,5);
  if(!top5.length){el.innerHTML='<div class="text-xs text-gray-700 text-center py-6">暂无数据</div>';return;}
  var h='';
  top5.forEach(function(x,i){
    h+='<div class="flex items-center gap-2 bg-[#0a0a0f] rounded-lg p-2 fade-in">'
      +'<span class="text-lg font-black w-6 text-center" style="color:'+TOP5_COLORS[i]+'">'+MEDALS[i]+'</span>'
      +'<span class="text-sm text-gray-300 font-medium w-20 truncate">'+x.dim+'</span>'
      +'<div class="flex-1 h-3 bg-[#111] rounded-full overflow-hidden ml-2"><div style="width:'+x.pct+'%;height:100%;background:'+TOP5_COLORS[i]+';border-radius:6px;transition:width .5s ease"></div></div>'
      +'<span class="text-xs font-bold w-12 text-right" style="color:'+TOP5_COLORS[i]+'">'+x.pct+'%</span>'
      +'</div>';
  });
  el.innerHTML=h;
}
function switchMode(m){
  currentMode=m;
  document.getElementById('tab-cards-btn').className=m==='cards'?'px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-[#0a0a0f] text-[#00ff88]':'px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-600 hover:text-[#00ff88]';
  document.getElementById('tab-clips-btn').className=m==='clips'?'px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-[#0a0a0f] text-[#ffd700]':'px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-600 hover:text-[#ffd700]';
  document.getElementById('view-cards').classList.toggle('hidden',m!=='cards');
  document.getElementById('view-clips').classList.toggle('hidden',m!=='clips');
}
async function toggleLive(){var btn=document.getElementById('btn-live-toggle');btn.disabled=true;try{if(isLive){await stopLive();}else{await startLive();}}finally{btn.disabled=false;}}

async function startLive(){
  var iv=document.getElementById('rotation-interval').value;
  var r,d;
  try{r=await fetch(API+'/api/live/start?interval='+iv,{method:'POST'});d=await r.json();}
  catch(e){alert('无法连接服务器, 请确认后端已启动');return;}
  if(!d.ok){
    if(confirm('直播已在进行中(可能上次未正常结束)。是否强制重置?')){
      await fetch(API+'/api/live/force-reset',{method:'POST'});
      await startLive();return;
    }
    return;
  }
  isLive=true;liveStartTime=Date.now();totalCards=0;
  document.getElementById('btn-live-toggle').textContent='结束直播';
  document.getElementById('btn-live-toggle').className='btn-danger px-6 py-2 rounded-lg text-sm font-bold tracking-wider bg-gradient-to-r from-red-600 to-rose-600 text-white hover:shadow-lg hover:shadow-red-500/25';
  document.getElementById('status-dot').className='pulse live';
  document.getElementById('status-text').textContent='直播中';document.getElementById('status-text').style.color='#00ff88';
  document.getElementById('stat-online').textContent=d.online_count;
  document.getElementById('info-status').textContent='状态: 监测中';
  document.getElementById('view-cards').innerHTML='';
  highlightClips=[];recordedChunks=[];currentClipStart=null;switchMode('cards');
  await startWebcam();startRecording();startMicMonitor();startCardStream();
  fetchLiveStats();
  statsTimer=setInterval(fetchLiveStats,5000);
  onlineUsersTimer=setInterval(fetchOnlineUsers,3000);
  fetchOnlineUsers();
  elapsedTimer=setInterval(function(){
    if(!isLive)return;var s=Math.floor((Date.now()-liveStartTime)/1000);
    document.getElementById('stat-elapsed').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
}

async function stopLive(){
  stopRecording();stopMicMonitor();
  try{await fetch(API+'/api/live/stop',{method:'POST'});}catch(e){}
  isLive=false;
  document.getElementById('btn-live-toggle').textContent='开始直播';
  document.getElementById('btn-live-toggle').className='btn-primary px-6 py-2 rounded-lg text-sm font-bold tracking-wider bg-gradient-to-r from-green-600 to-emerald-600 text-white hover:shadow-lg hover:shadow-green-500/25';
  document.getElementById('status-dot').className='pulse off';document.getElementById('status-text').textContent='离线';document.getElementById('status-text').style.color='#64748b';
  document.getElementById('rec-dot').classList.add('hidden');
  if(cardSource){cardSource.close();cardSource=null;}
  if(statsTimer){clearInterval(statsTimer);statsTimer=null;}
  if(elapsedTimer){clearInterval(elapsedTimer);elapsedTimer=null;}
  if(onlineUsersTimer){clearInterval(onlineUsersTimer);onlineUsersTimer=null;}
  stopWebcam();document.getElementById('info-status').textContent='状态: 离线';
  buildClipGallery();switchMode('clips');
  setTimeout(function(){drawAudienceHistory();},200);
}

async function startWebcam(){
  if(!webcamEnabled)return;
  try{mediaStream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:360},audio:false});
    document.getElementById('webcam-video').srcObject=mediaStream;
    document.getElementById('webcam-video').classList.remove('hidden');
    document.getElementById('webcam-placeholder').classList.add('hidden');
  }catch(e){webcamEnabled=false;document.getElementById('chk-webcam').checked=false;}
}
function stopWebcam(){if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;}
  document.getElementById('webcam-video').classList.add('hidden');
  document.getElementById('webcam-placeholder').classList.remove('hidden');}
function toggleWebcam(){webcamEnabled=document.getElementById('chk-webcam').checked;if(isLive){webcamEnabled?startWebcam():stopWebcam();}}

function startRecording(){
  if(!mediaStream)return;
  try{var m='video/webm;codecs=vp9';if(!MediaRecorder.isTypeSupported(m))m='video/webm';
    mediaRecorder=new MediaRecorder(mediaStream,{mimeType:m});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recordedChunks.push(e.data);};
    mediaRecorder.start(1000);document.getElementById('rec-dot').classList.remove('hidden');currentClipStart=Date.now();
  }catch(e){}
}
function captureHighlightClip(reason){
  if(!mediaRecorder||recordedChunks.length===0)return;
  var end=Date.now(),start=currentClipStart||(end-15000);
  var blob=new Blob(recordedChunks.slice(-30),{type:'video/webm'});
  var url=URL.createObjectURL(blob);
  highlightClips.push({id:highlightClips.length+1,url:url,startTime:new Date(start).toLocaleTimeString(),endTime:new Date(end).toLocaleTimeString(),reason:reason||'画像漂移'});
  document.getElementById('info-clips').textContent='切片: '+highlightClips.length;
  currentClipStart=Date.now();
}
function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();document.getElementById('rec-dot').classList.add('hidden');}}
function buildClipGallery(){
  var c=document.getElementById('clip-gallery');
  if(!c)return;
  if(highlightClips.length===0){c.innerHTML='<div class="text-center py-8 text-gray-600"><p class="text-sm">无高光切片</p></div>';return;}
  var h='<h3 class="text-xs text-gray-500 uppercase tracking-wider mb-2">高光切片 ('+highlightClips.length+'段)</h3>';
  highlightClips.forEach(function(clip){
    h+='<div class="panel p-3 flex gap-3 mb-2 fade-in"><div class="w-1/3 bg-black rounded overflow-hidden" style="aspect-ratio:16/9"><video src="'+clip.url+'" class="w-full h-full object-cover" controls preload="metadata"></video></div>'
      +'<div class="flex-1 flex flex-col justify-center"><div class="text-xs text-[#ffd700] font-bold mb-1">#'+clip.id+' '+clip.startTime+' - '+clip.endTime+'</div>'
      +'<div class="text-sm text-gray-300 mb-2">'+clip.reason+'</div>'
      +'<div class="flex gap-2"><button onclick="this.closest(\'.panel\').querySelector(\'video\').play()" class="px-3 py-1 rounded text-xs bg-[#0a0a0f] border border-[#1e1e30] text-[#00ff88] hover:border-[#00ff88]">播放</button>'
      +'<a href="'+clip.url+'" download="clip_'+clip.id+'.webm" class="px-3 py-1 rounded text-xs bg-[#0a0a0f] border border-[#1e1e30] text-gray-500 hover:text-gray-300">下载</a></div></div></div>';
  });
  c.innerHTML=h;
}

async function fetchLiveStats(){
  if(!isLive)return;
  try{var r=await fetch(API+'/api/live/stats');var d=await r.json();
    document.getElementById('stat-online').textContent=d.online_count;
    document.getElementById('stat-rotations').textContent=d.rotation_count;
    document.getElementById('stat-cards').textContent=d.card_count||0;
    document.getElementById('drift-baseline').textContent=(d.baseline_top5||[])[0]||'--';
    document.getElementById('drift-current').textContent=(d.current_top5||[])[0]||'--';
    if(d.preferences&&d.preferences.length>0)renderTop5(d.preferences);
    if(d.history)audienceHistoryData=d.history;
  }catch(e){}
}

function drawAudienceHistory(){
  var data=audienceHistoryData;
  if(!data||data.length<2)return;
  var container=document.getElementById('audience-history-chart');
  if(!container)return;
  container.innerHTML='';
  var c=echarts.init(container);chartInstance=c;
  var times=data.map(function(d){var dt=new Date(d[0]*1000);return dt.getMinutes()+':'+String(dt.getSeconds()).padStart(2,'0');});
  var counts=data.map(function(d){return d[1];});
  var maxCount=Math.max.apply(null,counts);
  var peakIdx=counts.indexOf(maxCount);
  var markPoints=[];
  if(peakIdx>=0)markPoints.push({coord:[times[peakIdx],maxCount],name:'峰值 '+maxCount+'人',symbol:'pin',symbolSize:30,itemStyle:{color:'#ffd700'},label:{color:'#fff',fontSize:10}});
  c.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#1a1a2e',borderColor:'#00ff88',textStyle:{color:'#e2e8f0',fontSize:11}},
    grid:{left:'10%',right:'10%',top:'15%',bottom:'12%'},
    xAxis:{type:'category',data:times,axisLabel:{color:'#94a3b8',fontSize:9,rotate:0,interval:Math.max(1,Math.floor(times.length/8))},axisLine:{lineStyle:{color:'#1e1e30'}}},
    yAxis:{type:'value',name:'人数',nameTextStyle:{color:'#64748b',fontSize:10},axisLabel:{color:'#64748b',fontSize:10},splitLine:{lineStyle:{color:'#1a1a25'}}},
    series:[{type:'line',data:counts,smooth:true,lineStyle:{color:'#00ff88',width:2},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(0,255,136,.15)'},{offset:1,color:'rgba(0,255,136,0)'}]}},itemStyle:{color:'#00ff88'},symbol:'circle',symbolSize:4,markPoint:{data:markPoints}}]
  });
  window.addEventListener('resize',function(){c.resize();},{once:true});
}

async function fetchOnlineUsers(){
  if(!isLive)return;
  var el=document.getElementById('online-users-table');
  var tel=document.getElementById('table-count');
  if(!el)return;
  try{
    var r=await fetch(API+'/api/live/users/online');
    if(!r.ok){el.innerHTML='<div class="text-xs text-gray-700 text-center py-4">加载失败</div>';return;}
    var d=await r.json();
    tel.textContent=(d.count||0)+'人';
    if(!d.count||!d.online||d.online.length===0){
      el.innerHTML='<div class="text-xs text-gray-700 text-center py-4">暂无在线用户</div>';return;
    }
    var labels=d.labels||LABELS;
    var h='<div style="display:flex;flex-direction:column;gap:2px">';
    for(var i=0;i<d.online.length;i++){
      var u=d.online[i],di=u.dominant_dim;
      var dl=labels[di]||('#'+di),co=COLORS[di%COLORS.length];
      var tops='';
      if(u.top3)for(var j=0;j<Math.min(3,u.top3.length);j++)tops+=labels[u.top3[j][0]]+':'+Math.round(u.top3[j][1]*100)+'% ';
      h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;font-size:11px" class="fade-in">'
        +'<span style="color:#64748b;width:64px;flex-shrink:0">'+u.user_id+'</span>'
        +'<span style="color:#94a3b8;width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+u.username+'</span>'
        +'<span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:bold;flex-shrink:0;background:'+co+'20;color:'+co+'">'+dl+'</span>'
        +'<span style="color:#64748b;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+tops+'</span>'
        +'</div>';
    }
    h+='</div>';el.innerHTML=h;
  }catch(e){el.innerHTML='<div class="text-xs text-gray-700 text-center py-4">加载失败</div>';}
}

function startCardStream(){
  if(cardSource)cardSource.close();
  cardSource=new EventSource(API+'/api/live/cards/stream?llm_mode=mock');
  cardSource.onmessage=function(e){
    var m=JSON.parse(e.data);
    if(m.type==='heartbeat'){
      document.getElementById('info-status').textContent='监测中 ('+m.online+'在线)';
    }else if(m.type==='card'){
      totalCards=m.card_number||(totalCards+1);
      document.getElementById('stat-cards').textContent=totalCards;
      document.getElementById('info-cards').textContent='卡片: '+totalCards;
      document.getElementById('info-status').textContent='监测中';
      captureHighlightClip((m.card_type||'drift')+': '+(m.current||[]).join(','));
      renderCard(m.card,m.card_number||totalCards,m.card_type||'drift');
    }else if(m.type==='stopped'){
      document.getElementById('info-status').textContent='直播已结束';
    }
  };
}
function renderCard(card,num,ct){
  var el=document.getElementById('view-cards');
  if(el.querySelector('.text-center.py-12'))el.innerHTML='';
  var tc={initial:'#00d4ff',drift:'#ffd700',cold:'#ff4757'},tl={initial:'开场',drift:'漂移',cold:'冷场'};
  var bc=tc[ct]||'#ffd700',lb=tl[ct]||'决策';
  var d=document.createElement('div');d.className='panel card-pop card-glow p-4';
  d.style.borderLeft='4px solid '+bc;
  d.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:10px">'
    +'<span style="font-size:11px;font-weight:bold;color:'+bc+'">#'+num+' '+lb+'卡片</span>'
    +'<span style="font-size:11px;color:#64748b">'+new Date().toLocaleTimeString()+'</span></div>'
    +'<div style="margin-bottom:10px"><div style="font-size:10px;color:#64748b;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px">话题</div><div style="font-size:16px;font-weight:bold;color:#00d4ff">'+card.topic+'</div></div>'
    +'<div style="margin-bottom:10px"><div style="font-size:10px;color:#64748b;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px">洞察</div><div style="font-size:13px;color:#cbd5e1">'+card.reason+'</div></div>'
    +'<div><div style="font-size:10px;color:#64748b;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px">口播</div><div style="font-size:13px;color:#94a3b8;font-style:italic;padding:8px;background:rgba(0,255,136,.04);border-radius:6px;border-left:2px solid '+bc+'">"'+card.script+'"</div></div>';
  el.prepend(d);el.scrollTop=0;
}

async function startMicMonitor(){
  if(!micEnabled)return;
  try{micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioContext=new AudioContext();var s=audioContext.createMediaStreamSource(micStream);
    analyserNode=audioContext.createAnalyser();analyserNode.fftSize=256;s.connect(analyserNode);
    document.getElementById('mic-indicator').classList.remove('hidden');
    var b=document.getElementById('mic-bars');b.innerHTML='';
    for(var i=0;i<8;i++){var d=document.createElement('div');d.className='w-1 bg-gray-700 rounded-full';d.style.height='4px';b.appendChild(d);}
    silenceStart=null;micCheckInterval=setInterval(checkMicLevel,200);
  }catch(e){micEnabled=false;}
}
function stopMicMonitor(){
  if(micCheckInterval){clearInterval(micCheckInterval);micCheckInterval=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioContext&&audioContext.state!=='closed'){audioContext.close();audioContext=null;}
  document.getElementById('mic-indicator').classList.add('hidden');silenceStart=null;
}
function checkMicLevel(){
  if(!analyserNode)return;
  var d=new Uint8Array(analyserNode.frequencyBinCount);analyserNode.getByteTimeDomainData(d);
  var sum=0;for(var i=0;i<d.length;i++){var v=(d[i]-128)/128;sum+=v*v;}
  var rms=Math.sqrt(sum/d.length),bars=document.getElementById('mic-bars').children;
  var level=Math.min(1,rms*40);
  for(var i=0;i<bars.length;i++){bars[i].style.height=(4+level*20*(0.4+0.6*Math.random()))+'px';bars[i].style.backgroundColor=level>0.3?'#00ff88':level>0.15?'#ffd700':'#64748b';}
  var timer=document.getElementById('mic-silence-timer');
  if(rms<MIC_THRESHOLD){
    if(!silenceStart)silenceStart=Date.now();
    var sec=Math.floor((Date.now()-silenceStart)/1000);
    timer.textContent=sec+'s';timer.style.color=sec>6?'#ff4757':'#ffd700';
    if(Date.now()-silenceStart>=SILENCE_DURATION){silenceStart=null;fetch(API+'/api/live/cold-field?source=mic',{method:'POST'}).catch(function(){});}
  }else{silenceStart=null;timer.textContent='--';timer.style.color='#64748b';}
}

window.addEventListener('resize',function(){if(chartInstance)chartInstance.resize();});
fetchLiveStats();
